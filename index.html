<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BN MATH<title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 10px 0;
        }
        
        h1 {
            font-size: 2.2em;
            font-weight: 800;
            background: linear-gradient(90deg, #4a4a4a, #6a6a6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .game-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            height: 100%;
        }
        
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.6);
            background: #1a1a1a;
        }
        
        .game-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 1.2em;
            text-align: center;
        }
        
        .game-content {
            padding: 15px;
        }
        
        .game-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 5px;
            color: #f5f5f5;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }
        
        .game-desc {
            color: #aaa;
            font-size: 0.9em;
            line-height: 1.3;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .game-link {
            display: inline-block;
            background: linear-gradient(135deg, #4a4a4a, #6a6a6a);
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95em;
            transition: all 0.2s;
            border: 1px solid #4a4a4a;
        }
        
        .game-link:hover {
            background: #555;
            transform: scale(1.02);
            border-color: #555;
        }
        
        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            font-size: 0.8em;
            color: #777;
        }
        
        .game-meta {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .game-type {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7em;
        }
        
        .game-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #222;
            color: #4a4a4a;
            font-size: 0.8em;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Dark Unblocked Games</h1>
        </header>
        
        <div id="games-container"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gamesContainer = document.getElementById('games-container');
            
            // Your games go here (add new games by appending to this array)
            const games = [
                {
                    id: "game1",
                    title: "Space Invaders",
                    desc: "Classic arcade shooter from 1978",
                    img: "games/space-invaders.png",
                    url: "games/space-invaders.html",
                    type: "arcade",
                    badge: "unblocked"
                },
                // ADD NEW GAMES HERE (see instructions below)
            ];

            // Render games in the container
            games.forEach(game => {
                const gameCard = document.createElement('div');
                gameCard.className = 'game-card';
                
                // Check if image exists
                const hasImage = game.img.includes('games/');
                const imgSrc = hasImage ? game.img : 'games/space-invaders.png';
                
                gameCard.innerHTML = `
                    <div class="game-image" style="background-image: url(${imgSrc})"></div>
                    <div class="game-content">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-desc">${game.desc}</p>
                        <a href="${game.url}" class="game-link" target="_blank">Play Now</a>
                        <div class="game-footer">
                            <div class="game-meta">
                                <span class="game-type">${game.type}</span>
                                <span class="game-badge">${game.badge}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                gamesContainer.appendChild(gameCard);
            });
        });
    </script>
</body>
</html>
