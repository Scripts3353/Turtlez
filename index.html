<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Bulk Cookie Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #0f172a; }
    .log { max-height: 420px; overflow-y: auto; }
  </style>
</head>
<body class="text-slate-200">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-5xl font-bold text-red-600 text-center mb-2">NETFLIX COOKIE CHECKER</h1>
    <p class="text-center text-slate-400 mb-10">Backend powered • Real checking via Render</p>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Controls -->
      <div class="lg:col-span-4 bg-slate-900 rounded-3xl p-8 border border-slate-700">
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
          <i class="fas fa-upload"></i> Upload Cookies
        </h2>

        <input type="file" id="fileInput" multiple accept=".txt" 
               class="block w-full text-sm text-slate-400 file:mr-4 file:py-4 file:px-8 file:rounded-2xl file:border-0 file:bg-red-600 file:text-white hover:file:bg-red-700 mb-6">

        <button onclick="startCheck()" id="checkBtn"
                class="w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold text-xl flex items-center justify-center gap-3 transition">
          <i class="fas fa-play"></i> START BULK CHECK
        </button>

        <div id="status" class="mt-6 text-center text-sm text-slate-400"></div>
      </div>

      <!-- Stats & Results -->
      <div class="lg:col-span-8 space-y-6">
        <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700">
          <div class="grid grid-cols-4 gap-4 text-center">
            <div><div id="total" class="text-4xl font-bold">0</div><div class="text-xs text-slate-500">TOTAL</div></div>
            <div><div id="hitsCount" class="text-4xl font-bold text-emerald-400">0</div><div class="text-xs text-emerald-400">HITS</div></div>
            <div><div id="badCount" class="text-4xl font-bold text-red-400">0</div><div class="text-xs text-red-400">BAD</div></div>
            <div><div id="progress" class="text-4xl font-bold text-amber-400">0%</div><div class="text-xs text-slate-500">PROGRESS</div></div>
          </div>
        </div>

        <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700">
          <h3 class="font-semibold mb-4 text-lg">Live Log</h3>
          <div id="log" class="log bg-black/60 p-5 rounded-2xl font-mono text-sm text-slate-300 whitespace-pre-wrap"></div>
        </div>

        <div class="bg-slate-900 rounded-3xl p-8 border border-emerald-700" id="hitsSection" style="display:none">
          <h3 class="font-semibold mb-4 text-lg text-emerald-400">Premium Hits</h3>
          <div id="hitsList" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const backendUrl = "https://your-render-app.onrender.com";   // ← CHANGE THIS to your Render URL

    function log(msg, type = "info") {
      const logDiv = document.getElementById("log");
      const time = new Date().toLocaleTimeString();
      let color = type === "hit" ? "text-emerald-400" : type === "bad" ? "text-red-400" : "text-slate-300";
      logDiv.innerHTML += `<span class="text-slate-500">[${time}]</span> <span class="${color}">${msg}</span><br>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function startCheck() {
      const files = document.getElementById("fileInput").files;
      if (!files.length) return alert("Please select at least one .txt cookie file");

      document.getElementById("checkBtn").disabled = true;
      document.getElementById("status").innerHTML = "Checking... Please wait";

      const formData = new FormData();
      for (let file of files) {
        formData.append("cookies", file);
      }

      try {
        const res = await fetch(`${backendUrl}/api/check-cookies`, {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        document.getElementById("total").textContent = data.total;
        document.getElementById("hitsCount").textContent = data.hits;
        document.getElementById("badCount").textContent = data.total - data.hits;

        log(`Finished! ${data.hits} hits out of ${data.total} cookies`, "hit");

        // Show hits
        const hitsList = document.getElementById("hitsList");
        hitsList.innerHTML = "";
        document.getElementById("hitsSection").style.display = "block";

        data.premium_hits.forEach(hit => {
          const div = document.createElement("div");
          div.className = "bg-slate-800 border border-emerald-600 rounded-2xl p-6";
          div.innerHTML = `
            <div class="flex justify-between">
              <div>
                <div class="font-bold text-emerald-400">${hit.email}</div>
                <div class="text-sm text-slate-400">${hit.plan} • ${hit.country}</div>
              </div>
              <div class="text-right text-xs bg-emerald-900 px-4 py-2 rounded-xl">${hit.price}</div>
            </div>
            <div class="mt-4 text-xs font-mono text-slate-500 break-all">${hit.cookie.substring(0,120)}...</div>
          `;
          hitsList.appendChild(div);
        });

      } catch (err) {
        log("Error connecting to backend: " + err.message, "bad");
        console.error(err);
      }

      document.getElementById("checkBtn").disabled = false;
      document.getElementById("status").innerHTML = "";
    }

    // Tailwind script already loaded via CDN
  </script>
</body>
</html>
